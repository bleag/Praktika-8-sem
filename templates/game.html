{% extends "base.html" %}

{% block title %}Игра: {{ quiz.title }}{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 50px auto; text-align: center;">
    <h1>{{ quiz.title }}</h1>
    <p>{{ quiz.description or 'Добро пожаловать в викторину!' }}</p>
    
    <div style="background: #f5f5f5; padding: 30px; border-radius: 20px; margin-top: 30px;">
        <h2>Код для входа: <span style="color: #2196F3; font-size: 32px;">{{ quiz.quiz_code }}</span></h2>
        <p style="margin-top: 20px;">Дай этот код игрокам, чтобы они могли подключиться</p>
        <button onclick="navigator.clipboard.writeText('{{ quiz.quiz_code }}')" style="background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
            📋 Скопировать код
        </button>
    </div>
    
    <div style="margin-top: 30px; display: flex; gap: 20px; justify-content: center;">
        <button id="startGameBtn" style="background: #4CAF50; color: white; padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer;">
            🎮 Начать игру
        </button>
        <a href="/" style="background: #666; color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px;">
            🏠 На главную
        </a>
    </div>
</div>

<script>
// Простейшая логика игры
const startBtn = document.getElementById('startGameBtn');
if (startBtn) {
    startBtn.onclick = async function() {
        // Получаем вопросы
        const response = await fetch(`/api/quiz/{{ quiz.id }}/questions`);
        const data = await response.json();
        
        if (data.success && data.questions.length > 0) {
            // Сохраняем вопросы в localStorage и переходим в игру
            localStorage.setItem('game_questions', JSON.stringify(data.questions));
            localStorage.setItem('quiz_title', '{{ quiz.title }}');
            window.location.href = `/play/{{ quiz.quiz_code }}/game`;
        } else {
            alert('Нет вопросов в викторине! Сначала добавь вопросы.');
        }
    };
}
</script>
{% endblock %}
