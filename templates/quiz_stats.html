{% extends "base.html" %}

{% block title %}Аналитика - {{ quiz.title }}{% endblock %}

{% block content %}
<div style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
    
    <div style="text-align: center; margin-bottom: 40px;">
        <h1>📊 Аналитика викторины</h1>
        <h2>{{ quiz.title }}</h2>
    </div>
    
    <!-- Карточки статистики -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
            <div style="font-size: 32px; font-weight: bold;" id="totalPlayers">0</div>
            <div>Всего игроков</div>
        </div>
        <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
            <div style="font-size: 32px; font-weight: bold;" id="avgScore">0</div>
            <div>Средний балл</div>
        </div>
        <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
            <div style="font-size: 32px; font-weight: bold;" id="maxScore">0</div>
            <div>Максимальный балл</div>
        </div>
    </div>
    
    <!-- Топ игроков -->
    <div style="background: white; border-radius: 20px; padding: 25px; margin-bottom: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h3>🏆 Топ-10 игроков</h3>
        <div id="topPlayersList"></div>
    </div>
    
    <!-- Все игроки -->
    <div style="background: white; border-radius: 20px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h3>📋 Все игроки</h3>
        <div id="allPlayersList" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
    
    <!-- Экспорт -->
    <div style="background: white; border-radius: 20px; padding: 25px; margin-top: 40px; text-align: center;">
        <button id="exportCSVBtn" class="btn btn-blue" style="background: #2196F3; padding: 12px 24px;">📥 Скачать CSV</button>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <a href="/profile" class="btn-outline-new">← Назад к викторинам</a>
    </div>
</div>

<style>
.question-card {
    background: #f9f9f9;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
}
</style>

<script>
const quizId = {{ quiz.id }};
let allResults = [];

async function loadData() {
    const res = await fetch(`/api/quiz/${quizId}/all-results?mode=all`);
    const data = await res.json();
    
    if (data.success) {
        allResults = data.results;
        renderPlayersTab();
    }
}

function renderPlayersTab() {
    const total = allResults.length;
    const scores = allResults.map(p => p.score);
    const avg = total > 0 ? scores.reduce((a, b) => a + b, 0) / total : 0;
    const max = total > 0 ? Math.max(...scores) : 0;
    
    document.getElementById('totalPlayers').innerText = total;
    document.getElementById('avgScore').innerText = avg.toFixed(1);
    document.getElementById('maxScore').innerText = max;
    
    const topPlayers = allResults.slice(0, 10);
    
    const topHtml = `
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr><th style="padding: 12px; text-align: left;">Место</th>
                    <th style="padding: 12px; text-align: left;">Игрок</th>
                    <th style="padding: 12px; text-align: center;">Счёт</th>
                    <th style="padding: 12px; text-align: center;">Дата</th>
                </tr>
            </thead>
            <tbody>
                ${topPlayers.map((p, i) => `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px;">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</td>
                        <td style="padding: 12px;">${escapeHtml(p.player_name)}</td>
                        <td style="padding: 12px; text-align: center; font-weight: bold;">${p.score}</td>
                        <td style="padding: 12px; text-align: center;">${p.finished_at}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('topPlayersList').innerHTML = topHtml;
    
    const allHtml = `
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr><th style="padding: 10px; text-align: left;">Игрок</th>
                    <th style="padding: 10px; text-align: center;">Счёт</th>
                    <th style="padding: 10px; text-align: center;">Дата</th>
                </tr>
            </thead>
            <tbody>
                ${allResults.map(p => `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px;">${escapeHtml(p.player_name)}</td>
                        <td style="padding: 10px; text-align: center; font-weight: bold;">${p.score}</td>
                        <td style="padding: 10px; text-align: center;">${p.finished_at}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('allPlayersList').innerHTML = allHtml;
}

document.getElementById('exportCSVBtn')?.addEventListener('click', () => {
    if (!allResults.length) {
        alert('Нет данных');
        return;
    }
    
    let csv = "\uFEFFИгрок;Счёт;Дата\n";
    allResults.forEach(p => {
        let name = p.player_name.replace(/"/g, '""');
        if (name.includes(';') || name.includes('"')) name = `"${name}"`;
        csv += `${name};${p.score};${p.finished_at}\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `quiz_${quizId}_results.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
});

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadData();
</script>
{% endblock %}
